<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup page</title>
    <style>
        .signuppage {
            background: linear-gradient(260deg, rgb(237, 45, 45), rgba(255, 0, 0, 0.712))
        }
    </style>
</head>

<body>
    <center class="body">
        <form method="POST" class="signuppage">

            <h1>signup Here</h1>
            <br>

            <div>
                Username<br><input type="text" name="username" id="username" placeholder=" Enter username">
                <br><br>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter ur email">
                <br><br>
                <label for="Password1">Password</label>
                <input type="password" name="password1" id="password1" placeholder="password">
                <br><br>
                <label for="password2">Confirm password</label>
                <input type="password" name="password2" id="password2" placeholder="confirm pass">
                <br><br>
                <br>
                <input type="button" value="signup" class="btn btn-success">
            </div>
        </form>
    </center>
</body>

</html>
